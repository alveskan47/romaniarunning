<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="author" content="Romania Running">
    <meta name="robots" content="index, follow">

    <link rel="icon" href="svg-files/logo-red.svg">
    <title>Calendar | Romania Running</title>

    <!-- Bootstrap CSS Framework v5.3.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- General CSS -->
    <link rel="stylesheet" href="css-files/main.css">

    <!-- Calendar CSS -->
    <link rel="stylesheet" href="css-files/calendar.css">
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav" id="dynamic-nav-links"></ul>
            <ul class="navbar-nav ms-auto" id="dynamic-theme-switcher"></ul>
        </div>
    </div>
</nav>

<!-- Main Content Area -->
<div class="container mt-5 mb-5">
    <h1 class="mb-4">Calendar</h1>

    <!-- Year, Month selectors and navigation -->
    <div class="d-flex align-items-center gap-3 mb-4">
        <button class="btn btn-outline-secondary" onclick="prevMonth()" aria-label="Previous month">
            <i class="bi bi-chevron-left"></i>
        </button>

        <div class="dropdown">
            <button class="btn btn-success dropdown-toggle" type="button" id="yearDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <span id="yearDropdownLabel"></span>
            </button>
            <ul class="dropdown-menu" id="yearDropdownMenu" aria-labelledby="yearDropdown"></ul>
        </div>

        <div class="dropdown">
            <button class="btn btn-success dropdown-toggle" type="button" id="monthDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                <span id="monthDropdownLabel"></span>
            </button>
            <ul class="dropdown-menu" id="monthDropdownMenu" aria-labelledby="monthDropdown"></ul>
        </div>

        <button class="btn btn-outline-secondary" onclick="nextMonth()" aria-label="Next month">
            <i class="bi bi-chevron-right"></i>
        </button>
    </div>

    <!-- Calendar table -->
    <table class="calendar-table">
        <thead>
            <tr>
                <th class="calendar-week-col">Week</th>
                <th>Mon</th>
                <th>Tue</th>
                <th>Wed</th>
                <th>Thu</th>
                <th>Fri</th>
                <th>Sat</th>
                <th>Sun</th>
            </tr>
        </thead>
        <tbody id="calendar-body"></tbody>
    </table>

    <!-- Races list -->
    <div id="races-list" class="mt-4"></div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

<!-- General JS -->
<script src="js-files/main.js"></script>

<!-- Calendar JS -->
<script src="js-files/calendar.js"></script>
</body>
</html>
