<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="author" content="Romania Running">
    <meta name="robots" content="index, follow">

    <link rel="icon" href="svg-files/logo-red.svg">
    <title>Map | Romania Running</title>

    <!-- Bootstrap CSS Framework v5.3.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Highcharts Maps + Marker Clusters -->
    <script src="js-local-external-files/highmaps.js"></script>
    <script src="js-local-external-files/marker-clusters.js"></script>
    <script src="js-local-external-files/accessibility.js"></script>

    <!-- General CSS -->
    <link rel="stylesheet" href="css-files/main.css">
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav" id="dynamic-nav-links"></ul>
            <ul class="navbar-nav ms-auto" id="dynamic-theme-switcher"></ul>
        </div>
    </div>
</nav>

<!-- Main Content Area -->
<div class="container mt-5 mb-5">
    <h1 class="mb-4">Map</h1>

    <!-- Year selector -->
    <h2>Select year:</h2>
    <div class="dropdown mb-4">
        <button class="btn btn-success dropdown-toggle" type="button" id="yearDropdown" data-bs-toggle="dropdown" aria-expanded="false">
            <span id="text_year"></span>
        </button>
        <ul class="dropdown-menu" id="year-dropdown-menu" aria-labelledby="yearDropdown"></ul>
    </div>

    <!-- Map chart -->
    <figure class="highcharts-figure">
        <div id="map-container" style="height: 600px;"></div>
    </figure>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

<!-- General JS -->
<script src="js-files/main.js"></script>

<!-- Map JS -->
<script src="js-files/map.js"></script>
</body>
</html>
