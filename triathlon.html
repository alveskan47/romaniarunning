<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding and viewport settings for responsive design -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <meta name="description" content="Calendar complet al competitiilor de triatlon din Romania. Gaseste curse de triatlon organizate in Romania.">
    <meta name="keywords" content="competitii triatlon Romania, curse triatlon, calendar triatlon Romania, triatlon competitional Romania">
    <meta name="robots" content="index, follow">

    <link rel="icon" href="svg-files/logo-red.svg">
    <title>Competitii Triatlon Romania | Romania Running</title>

    <!-- Bootstrap CSS Framework v5.3.3 from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Bootstrap Icons for theme switcher and other icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- General CSS - Styles applied across all pages -->
    <link rel="stylesheet" href="css-files/main.css">
</head>
<body onload="triathlon_main()">

<!-- Navigation Bar - Primary theme with dark mode support -->
<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
    <div class="container-fluid">
        <!-- Mobile hamburger menu toggle button -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Collapsible navigation menu -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Main navigation links (left side) - Dynamically generated from json/pages.json -->
            <ul class="navbar-nav" id="dynamic-nav-links">
                <!-- Navigation links will be inserted here by initializeNavbar() from main.js -->
            </ul>

            <!-- Theme switcher dropdown (right side) - Dynamically generated from main.js -->
            <ul class="navbar-nav ms-auto" id="dynamic-theme-switcher">
                <!-- Theme switcher will be inserted here by initializeNavbar() from main.js -->
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content Area -->
<div class="container mt-5 mb-5">
    <h1 class="mb-4">Triathlon Competitions</h1>

    <!-- Year Selector -->
    <h2>Select year:</h2>
    <div class="dropdown mb-4">
        <button class="btn btn-success dropdown-toggle" type="button" id="yearDropdown" data-bs-toggle="dropdown" aria-expanded="false">
            <span id="text_year"></span>
        </button>
        <ul class="dropdown-menu" id="year-dropdown-menu" aria-labelledby="yearDropdown">
            <!-- Year items will be inserted here by JavaScript -->
        </ul>
    </div>

    <!-- Triathlon competitions table will be loaded dynamically -->
    <div id="triathlon-table"></div>
</div>

<!-- Bootstrap JavaScript Bundle with Popper for interactive components -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

<!-- General JavaScript - Functions used across all pages (theme switcher, fetch utilities) -->
<script src="js-files/main.js"></script>

<!-- Page-specific JavaScript - Functions for loading and displaying triathlon competitions -->
<script src="js-files/triathlon.js"></script>
</body>
</html>
